<p>
<h1>[Y6KP Products]</h1>
<h2>Overview</h2>
<p>In <a target="_blank" href="https://arxiv.org/abs/2601.14559"><u>DES Collaboration (2026)</u></a> we present cosmology results combining galaxy clustering and weak gravitational lensing measured in the full six years (Y6) of observations by the Dark Energy Survey (DES) covering $\sim$5000\,deg$^2$. We perform a large-scale structure analysis with galaxy samples defined from the final data extending to redshift range $z \lesssim 2$, using three two-point correlation functions (3$\times$2pt): (i) cosmic shear measuring correlations among the shapes of 140 million source galaxies, (ii) auto-correlations of the spatial distribution of 9 million lens galaxies, and (iii) galaxy galaxy lensing from the cross-correlation between lens positions and source shapes.</p>
<p>We perform the analysis under a rigorous blinding protocol to prevent confirmation biases. We model the data in flat \lcdm and $w$CDM cosmologies.  We find consistent cosmological results from subsets of the three two-point correlation functions. Their combined analysis yields $S_8\equiv \sigma_8 (\Omega_{\rm m}/0.3)^{0.5} = 0.789^{+0.012}_{-0.012}$ and matter density $\Omega_{\rm m} = 0.333^{+0.023}_{-0.028}$ in $\Lambda$CDM (68\% CL), where $\sigma_8$ is the clustering amplitude. The factor of two improvement in constraining power in the $\Omega_{\rm m}$--$\sigma_8$ plane relative to DES Year 3 is due to higher source number density, extended redshift range, and improved modeling. These constraints show a (full-space) parameter difference of 1.8$\sigma$ from a combination of cosmic microwave background (CMB) primary anisotropy datasets from {\it Planck} 2018, ACT-DR6, and SPT-3G DR1. Projected only into $S_8$ the difference is $2.6\sigma$. In $w$CDM the Y6 3$\times$2pt results yield $S_8 = 0.782^{+0.021}_{-0.020}$, $\Omega_{\rm m} = 0.325^{+0.032}_{-0.035}$, and dark energy equation-of-state parameter $w = -1.12^{+0.26}_{-0.20}$. For the first time, we combine all DES dark-energy probes: 3$\times$2pt, SNe Ia, BAO and Clusters. In \lcdm this combination yields a $2.8\sigma$ parameter difference from the CMB. When combining DES 3$\times$2pt with other most constraining low-redshift datasets (DESI DR2 BAO, DES SNe Ia, SPT clusters), we find a 2.3$\sigma$ parameter difference with CMB. A joint fit of Y6 3$\times$2pt, CMB, and those low-$z$ datasets produces the tightest $\Lambda$CDM constraints to date: $S_8 = 0.806^{+0.006}_{-0.007}$, $\Omega_{\rm m} = 0.302^{+0.003}_{-0.003}$, $h = 0.683^{+0.003}_{-0.002}$, and $\sum m_\nu < 0.14$ eV (95\% CL). In $w$CDM, this dataset combination yields $w = -0.981^{+0.021}_{-0.022}$, with no significant preference over $\Lambda$CDM.</p>
<br>
<p>The full listing of downloadable files for the DES Y6 3x2pt analysis can be found <a target="_blank" href="http://desdr-server.ncsa.illinois.edu/despublic/y6a2_files/y6key_products/chains_release/"><strong><u>here (chains and data vectors)</u></strong></a><strong>, </strong>and <a target="_blank" href="http://desdr-server.ncsa.illinois.edu/despublic/y6a2_files/y6key_products/final_version/"><strong><u>here (data files)</u></strong></a>.</p>
<br>
<p><a href=https://www.darkenergysurvey.org/des-y6-cosmology-results-papers>link</a> to DES Y6 cosmology papers website.</p>

<h2>Data Vectors</h2>
<p>These files (with fiducial MagLim lens sample and MetaDetection source sample) include all the 3x2pt data vectors, redshift distributions, and covariance matrix.</p>
<p>They are included in a single FITS binary file, with 7 HDU extensions. Please note that metadata is stored as values in the header of each HDU, as described below, and may be necessary to understand the contents of the HDU.</p>


<p>We provide an example notebook <a target="_blank" href="http://desdr-server.ncsa.illinois.edu/despublic/y6a2_files/y6key_products/final_version/3x2pt_pipeline_public.ipynb"><strong><u>3x2pt_pipeline_public.ipynb</u></strong></a> that shows how to load the catalogs. Also, it can be used to reproduce the 3x2pt data vector and number densities and shape noise that are used as input for the covariance computation. It also shows an example of how to build the datavector in the two-point file format that cosmosis receives as input. </p>
<p>[3x2pt DV file name and link]: <a target="_blank" href="http://desdr-server.ncsa.illinois.edu/despublic/y6a2_files/y6key_products/final_version/3x2pt_2025-07-28-20h_UNBLINDED_wmask_nob2.fits"><strong><u>3x2pt_2025-07-28-20h_UNBLINDED_wmask_nob2.fits</u></strong></a></p>

<h2>Redshift Realizations</h2>
<p>The redshift realizations represent statistically plausible n(z) distributions obtained by propagating the uncertainties of the SOMPZ and clustering redshfit (WZ) calibration. This ensemble is then compressed into a small number of orthogonal modes that describe the dominant patterns of variation among the realizations. The amplitudes of these modes are varied as nuisance parameters in cosmological analyses, allowing the impact of photometric redshift uncertainties to be propagated efficiently.</p>
<br>
<p>The source nz realisations are currently stored here: </p>
<p><a href=https://desdr-server.ncsa.illinois.edu/despublic/y6a2_files/y6key_products/final_version/desy6_source_redshift.h5>desy6_source_redshift.h5</a></p>

<h2>Cosmology Chains</h2>
<p>Here we present the cosmological chains for the various models presented in the Y6 cosmic shear and 3x2pt papers. Information about the model and settings used in each chain are documented in the file headers. Released chains assume MAGLIM lens galaxy sample excluding lens bin 2, and we consider linear galaxy bias 3x2pt when combining with other probes e.g. all DES (3x2pt+BAO+SNe+CL).</p>
<p><br>The chains are produced using the Nautilus sampler. When using the chains, you must weight the contribution of each sample according to the weight column. The final N samples to be used are listed at the end of the chain (nsample), along with the final log evidence. Note that this is a nested sampler, so the sequence of samples is not a random walk.</p>
<br>
<p>The chains provided here can be used with any cosmological parameter estimation code. When combining the DES posteriors with external data sets (CMB, SNe, BAO), the joint posterior is obtained by combining the individual distributions with the normalizing-flow density estimators implemented in tensiometer (see Section IV D of the DES Y6 3×2pt paper), rather than by re-running a full joint likelihood. Chains produced in this way contain equally weighted samples and are marked with an asterisk (*) in the table below. An example Python script showing how to load and visualize both the Nautilus chains and the normalizing-flow combinations is available at 
 <a target="_blank" href="http://desdr-server.ncsa.illinois.edu/despublic/y6a2_files/y6key_products/chains_release/read_chains_y6.py"><u>read_chains_y6.py</u></a>
and the older Y3 version at <a target="_blank" href="http://desdr-server.ncsa.illinois.edu/despublic/y3a2_files/chains/read_chains_y3a2.py"><u>read_chains_y3a2.py</u></a></p>

<h1>[Y6KP Catalogs]</h1>
<h2>Overview </h2>
<p>The DES Year 6 cosmological analyses used a set of HDF5 files that contain the necessary catalog data to produce summary-statistic measurements. </p>
<br>
<p>All catalogs are provided as HDF5 files that share a common joint footprint mask (with an area of 4031.036 sq. deg.) and have four tomographic bins assigned. An index file links all individual files and stores metadata including provenance and creation date.</p>

<h3>Joint Mask</h3>
<p>A binary HEALSparse mask combining the Y6 weak lensing and large-scale structure footprints is already applied to all catalogs. This joint mask defines the survey area used in all KP analyses. The provided  <a target="_blank" href="http://desdr-server.ncsa.illinois.edu/despublic/y6a2_files/y6key_products/final_version/3x2pt_pipeline_public.ipynb"><strong><u>3x2pt_pipeline_public.ipynb</u></strong></a> has an example of how to load it and use it if needed.</p>

<h3>Random Catalogs</h3>
<p>Spatially uniform random point catalogs for the MagLim (at 50× the galaxy density) and RedMaGiC lens samples (at ~10× the galaxy density), split to match the tomographic binning of their respective lens catalogs. These are used in the estimation of two-point functions of clustering and galaxy-galaxy lensing.</p>
<h3>Gold Catalog</h3>
<p>This file contains all objects from the DES Y6 Gold v2.2 catalog that fall within the joint mask, stored as a single flat group in desy6kp/gold/gold/</p>
<p>The full Gold catalog, without the mask applied, is available at<a target="_blank" href="https://des.ncsa.illinois.edu/releases/y6a2/Y6gold"> <u>https://des.ncsa.illinois.edu/releases/y6a2/Y6gold</u></a>. It contains the same columns as the masked file, where you can also find their descriptions.</p>
<h3>Magnitude-Limited (MagLim++) Lens Sample</h3>
<br>
<p>A flux-limited galaxy sample selected for galaxy clustering and galaxy–galaxy lensing, split into 6 tomographic redshift bins. Survey property weights are included per tomographic bin. Note, additional columns including alternative systematics weights and columns from matching with the DESI Legacy Surveys (for star-galaxy separation) are included in the (row-matched) additional file <a target="_blank" href=http://desdr-server.ncsa.illinois.edu/despublic/y6a2_files/y6key_products/final_version/maglim_addl_cols_v1.hdf5>maglim_addl_cols_v1.hdf5</a>. Analyses using the MagLim++ sample are <em>strongly</em> encouraged to test the sensitivity of their results to changing the systematic weights from the main WEIGHT to WEIGHT_ISD as a contribution to the systematic error budget. The difference between the galaxy clustering 2-point correlation functions computed from these is already analytically marginalized over through a term in the DES Y6KP covariance matrix. More detailed information for the other columns can be found at <a href=https://www.legacysurvey.org/dr9/catalogs>https://www.legacysurvey.org/dr9/catalogs</a></p>
